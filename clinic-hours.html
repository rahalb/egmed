<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f3f0e9;
      width: 100%;
      height: 100%;
    }

    .wrap {
      box-sizing: border-box;
      width: 100vw;
      height: 100vh;
      padding: 24px;
      background: #f3f0e9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img id="hours" alt="Clinic Hours">
  </div>

  <script>
    document.getElementById('hours').src =
      'https://rahalb.github.io/egmed/clinic-hours.png?t=' + Date.now();
  </script>
</body>
</html>
