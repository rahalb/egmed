<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: white;
      overflow: hidden;
    }

    * {
      box-sizing: border-box;
    }

    .page {
      width: 100vw;
      height: 100vh;
      padding: 48px;
      background: white;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    img {
      display: block;
      width: 100%;
      max-width: calc(100vw - 96px);
      height: auto;
    }
  </style>
</head>
<body>
  <div class="page">
    <img id="hours" alt="Clinic Hours">
  </div>

  <script>
    document.getElementById('hours').src =
      'https://rahalb.github.io/egmed/clinic-hours.png?t=' + Date.now();
  </script>
</body>
</html>
