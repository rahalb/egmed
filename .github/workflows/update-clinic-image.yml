name: Update clinic image

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    env:
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Update clinic hours from Google
        run: node update-hours.js

      - name: Capture screenshot
        run: node screenshot.js

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clinic-hours-sensecraft.json clinic-hours.png package.json package-lock.json update-hours.js
          git diff --staged --quiet || git commit -m "Auto-update clinic hours and image [skip ci]"
          git push
