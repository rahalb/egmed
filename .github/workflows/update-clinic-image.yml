name: Update clinic image

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    env:
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Update clinic hours from Google
        run: node update-hours.js

      - name: Capture screenshot
        run: node screenshot.js

      - name: Check for changes
        id: changes
        run: |
          git add -N clinic-hours-sensecraft.json clinic-hours.png
          if git diff --quiet -- clinic-hours-sensecraft.json clinic-hours.png; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clinic-hours-sensecraft.json clinic-hours.png
          git commit -m "Update clinic image [skip ci]"
          git push
