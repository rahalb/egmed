<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinic Hours</title>
  <style>
    :root {
   --bg: #d9d6cf;
  --frame: #0a0a0a;
  --panel: #e9e5dc;
  --rule: #bdb7ad;
  --text: #171717;
  --muted: #585550;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 800px;
      height: 480px;
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
    }
    .screen {
      width: 800px;
      height: 480px;
      position: relative;
      background: var(--bg);
      overflow: hidden;
    }
    .frame {
  border-radius: 24px;
}

.panel {
  left: 32px;
  top: 30px;
  width: 736px;
  height: 420px;
  border-radius: 20px;
}
    .title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
    }
    .rule {
      height: 2px;
      background: var(--rule);
      width: 100%;
    }
    .hero {
      display: grid;
      grid-template-columns: 150px 1fr;
      column-gap: 18px;
      align-items: center;
      padding: 12px 0 10px 0;
    }
    .pill {
      width: 146px;
      height: 50px;
      border-radius: 25px;
      background: var(--frame);
      color: #f4f1ea;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .today-label {
      font-size: 16px;
      color: var(--muted);
      letter-spacing: .5px;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 2px;
    }
    .today-name {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.02;
      margin-bottom: 6px;
    }
    .today-hours {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.08;
      max-width: 360px;
    }
    .section-title {
      font-size: 17px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 12px 0 6px 0;
    }
    .hours-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 34px;
      margin-top: 2px;
    }
    .row {
      display: grid;
      grid-template-columns: 72px 1fr;
      column-gap: 12px;
      align-items: start;
      padding: 7px 0 6px 0;
      border-bottom: 2px solid var(--rule);
      min-height: 32px;
    }
    .day {
      font-size: 17px;
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1;
    }
    .value {
      font-size: 17px;
      line-height: 1.03;
      font-weight: 500;
    }
    .closed {
      font-style: italic;
      font-weight: 700;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="frame"></div>
    <div class="panel">
      <div class="title" id="clinic_name">EAST GWILLIMBURY MEDICAL CENTRE</div>
      <div class="rule"></div>

      <div class="hero">
        <div class="pill" id="status">CHECKING</div>
        <div>
          <div class="today-label">Today</div>
          <div class="today-name" id="today_name">Tuesday</div>
          <div class="today-hours" id="today_hours">10:00 AM – 3:00 PM, 4:30 – 7:00 PM</div>
        </div>
      </div>

      <div class="rule"></div>
      <div class="section-title">Weekly Hours</div>

      <div class="hours-grid">
        <div>
          <div class="row"><div class="day">MON</div><div class="value" id="monday"></div></div>
          <div class="row"><div class="day">TUE</div><div class="value" id="tuesday"></div></div>
          <div class="row"><div class="day">WED</div><div class="value" id="wednesday"></div></div>
        </div>
        <div>
          <div class="row"><div class="day">THU</div><div class="value" id="thursday"></div></div>
          <div class="row"><div class="day">FRI</div><div class="value" id="friday"></div></div>
          <div class="row"><div class="day">SAT</div><div class="value" id="saturday"></div></div>
          <div class="row"><div class="day">SUN</div><div class="value" id="sunday"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const DATA_URL = './clinic-hours-sensecraft.json';
    const DAYS = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];

    function setField(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = value || '';
      el.classList.remove('closed');
      if (String(value).trim().toLowerCase() === 'closed') {
        el.classList.add('closed');
      }
    }

    function toMinutes(hour, minute, period) {
      let h = hour;
      if (period === 'AM' && h === 12) h = 0;
      if (period === 'PM' && h !== 12) h += 12;
      return h * 60 + minute;
    }

    function parseTime(text) {
      const match = String(text).trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (!match) return null;
      return toMinutes(
        parseInt(match[1], 10),
        parseInt(match[2], 10),
        match[3].toUpperCase()
      );
    }

    function isOpenNow(hoursText, currentMinutes) {
      if (!hoursText || String(hoursText).trim().toLowerCase() === 'closed') return false;

      const ranges = String(hoursText)
        .split(',')
        .map(part => part.trim())
        .filter(Boolean);

      for (const range of ranges) {
        const parts = range.split('–').map(part => part.trim());
        if (parts.length !== 2) continue;

        const start = parseTime(parts[0]);
        const end = parseTime(parts[1]);

        if (start === null || end === null) continue;

        if (currentMinutes >= start && currentMinutes < end) {
          return true;
        }
      }

      return false;
    }

    function getTorontoNow() {
      const now = new Date();

      const weekdayName = new Intl.DateTimeFormat('en-US', {
        weekday: 'long',
        timeZone: 'America/Toronto'
      }).format(now);

      const parts = new Intl.DateTimeFormat('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true,
        timeZone: 'America/Toronto'
      }).formatToParts(now);

      const hour = parseInt(parts.find(p => p.type === 'hour').value, 10);
      const minute = parseInt(parts.find(p => p.type === 'minute').value, 10);
      const period = parts.find(p => p.type === 'dayPeriod').value.toUpperCase();

      return {
        weekdayName,
        weekdayKey: weekdayName.toLowerCase(),
        currentMinutes: toMinutes(hour, minute, period)
      };
    }

    function updateStatusPill(isOpen) {
      const pill = document.getElementById('status');
      pill.textContent = isOpen ? 'OPEN NOW' : 'CLOSED';
    }

    fetch(DATA_URL + '?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.json())
      .then(data => {
        const torontoNow = getTorontoNow();
        const todayKey = torontoNow.weekdayKey;
        const todayLabel = torontoNow.weekdayName;
        const todayHours = data[todayKey] || 'Closed';
        const open = isOpenNow(todayHours, torontoNow.currentMinutes);

        document.getElementById('clinic_name').textContent = (data.clinic_name || '').toUpperCase();
        document.getElementById('today_name').textContent = todayLabel;
        document.getElementById('today_hours').textContent = todayHours;
        updateStatusPill(open);

        ['monday','tuesday','wednesday','thursday','friday','saturday','sunday']
          .forEach(k => setField(k, data[k] || ''));
      })
      .catch(() => {
        document.getElementById('status').textContent = 'CLOSED';
        document.getElementById('today_name').textContent = 'Unavailable';
        document.getElementById('today_hours').textContent = 'Hours unavailable';
      });
  </script>
</body>
</html>
