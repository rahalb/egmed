<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=800, height=480, initial-scale=1.0" />
  <title>Clinic Hours</title>
  <style>
    :root {
      --bg: #d9d6cf;
      --frame: #0a0a0a;
      --panel: #e9e5dc;
      --rule: #bdb7ad;
      --text: #171717;
      --muted: #585550;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 800px;
      height: 480px;
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
    }
    .screen {
      width: 800px;
      height: 480px;
      position: relative;
      background: var(--bg);
    }
    .frame {
      position: absolute;
      left: 24px;
      top: 24px;
      width: 752px;
      height: 432px;
      background: var(--frame);
      border-radius: 38px;
    }
    .panel {
      position: absolute;
      left: 60px;
      top: 58px;
      width: 680px;
      height: 370px;
      background: var(--panel);
      border-radius: 32px;
      padding: 26px 32px 24px 32px;
    }
    .title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
    }
    .rule {
      height: 2px;
      background: var(--rule);
      width: 100%;
    }
    .hero {
      display: grid;
      grid-template-columns: 170px 1fr;
      column-gap: 20px;
      align-items: center;
      padding: 16px 0 10px 0;
    }
    .pill {
      width: 164px;
      height: 56px;
      border-radius: 28px;
      background: var(--frame);
      color: #f4f1ea;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    .today-label {
      font-size: 18px;
      color: var(--muted);
      letter-spacing: .6px;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 2px;
    }
    .today-name {
      font-size: 29px;
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 8px;
    }
    .today-hours {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.15;
      max-width: 380px;
    }
    .section-title {
      font-size: 18px;
      color: var(--muted);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin: 12px 0 8px 0;
    }
    .hours-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 28px;
      margin-top: 6px;
    }
    .col { padding-right: 4px; }
    .row {
      display: grid;
      grid-template-columns: 86px 1fr;
      column-gap: 14px;
      align-items: start;
      padding: 10px 0 8px 0;
      border-bottom: 2px solid var(--rule);
      min-height: 42px;
    }
    .day {
      font-size: 19px;
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1.05;
    }
    .value {
      font-size: 18px;
      line-height: 1.05;
      font-weight: 500;
    }
    .closed {
      font-style: italic;
      font-weight: 700;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="frame"></div>
    <div class="panel">
      <div class="title" id="clinic_name">EAST GWILLIMBURY MEDICAL CENTRE</div>
      <div class="rule"></div>
      <div class="hero">
        <div class="pill" id="status">OPEN NOW</div>
        <div>
          <div class="today-label">Today</div>
          <div class="today-name" id="today_name">Tuesday</div>
          <div class="today-hours" id="today_hours">10:00 AM – 3:00 PM, 4:30 – 7:00 PM</div>
        </div>
      </div>
      <div class="rule"></div>
      <div class="section-title">Weekly Hours</div>
      <div class="hours-grid">
        <div class="col">
          <div class="row"><div class="day">MON</div><div class="value" id="monday"></div></div>
          <div class="row"><div class="day">TUE</div><div class="value" id="tuesday"></div></div>
          <div class="row"><div class="day">WED</div><div class="value" id="wednesday"></div></div>
        </div>
        <div class="col">
          <div class="row"><div class="day">THU</div><div class="value" id="thursday"></div></div>
          <div class="row"><div class="day">FRI</div><div class="value" id="friday"></div></div>
          <div class="row"><div class="day">SAT</div><div class="value" id="saturday"></div></div>
          <div class="row"><div class="day">SUN</div><div class="value" id="sunday"></div></div>
        </div>
      </div>
    </div>
  </div>
<script>
const DATA_URL = './clinic-hours-sensecraft.json';
function statusText(v) {
  if (!v) return '';
  const s = String(v).trim().toLowerCase();
  if (s === 'open') return 'OPEN NOW';
  if (s === 'closed') return 'CLOSED';
  return String(v).toUpperCase();
}
function setField(id, value) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = value || '';
  if (String(value).trim().toLowerCase() === 'closed') el.classList.add('closed');
}
fetch(DATA_URL)
  .then(r => r.json())
  .then(data => {
    document.getElementById('clinic_name').textContent = (data.clinic_name || '').toUpperCase();
    document.getElementById('status').textContent = statusText(data.status);
    document.getElementById('today_name').textContent = data.today_name || '';
    document.getElementById('today_hours').textContent = data.today_hours || '';
    ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'].forEach(k => setField(k, data[k] || ''));
  });
</script>
</body>
</html>
