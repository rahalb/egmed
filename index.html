<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=800, initial-scale=1.0" />
  <title>Clinic Hours</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #183153;
      --muted: #5b6b82;
      --accent: #2c7be5;
      --open-bg: #e7f7ee;
      --open-text: #18794e;
      --closed-bg: #fdecec;
      --closed-text: #c0392b;
      --border: #d9e2ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 800px;
      height: 480px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #eef4fb 0%, #f8fbff 100%);
      color: var(--text);
    }

    .frame {
      width: 800px;
      height: 480px;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      height: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 12px 35px rgba(24, 49, 83, 0.10);
      padding: 28px 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }

    .title-wrap {
      min-width: 0;
      flex: 1;
    }

    .clinic-name {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .clinic-address {
      margin: 0;
      font-size: 17px;
      line-height: 1.4;
      color: var(--muted);
      max-width: 520px;
    }

    .status {
      flex-shrink: 0;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-align: center;
      min-width: 150px;
    }

    .status.open {
      background: var(--open-bg);
      color: var(--open-text);
    }

    .status.closed {
      background: var(--closed-bg);
      color: var(--closed-text);
    }

    .middle {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      align-items: stretch;
      margin: 18px 0;
      flex: 1;
    }

    .panel {
      background: #f9fbfe;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
    }

    .panel-label {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .today-day {
      margin: 0 0 8px;
      font-size: 26px;
      font-weight: 800;
    }

    .today-hours {
      margin: 0;
      font-size: 22px;
      line-height: 1.35;
      font-weight: 700;
      color: var(--text);
    }

    .week-list {
      display: grid;
      grid-template-columns: 120px 1fr;
      row-gap: 10px;
      column-gap: 14px;
      align-content: start;
      font-size: 16px;
    }

    .week-day {
      font-weight: 800;
      color: var(--text);
      text-transform: capitalize;
    }

    .week-hours {
      color: var(--muted);
      font-weight: 600;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .bottom-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .source {
      color: var(--accent);
    }

    .loading {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="card loading" id="card">
      <div class="top">
        <div class="title-wrap">
          <h1 class="clinic-name" id="clinic-name">Loading clinic…</h1>
          <p class="clinic-address" id="clinic-address">Loading address…</p>
        </div>
        <div class="status closed" id="status">CHECKING</div>
      </div>

      <div class="middle">
        <div class="panel">
          <p class="panel-label">Today</p>
          <h2 class="today-day" id="today-name">—</h2>
          <p class="today-hours" id="today-hours">Loading hours…</p>
        </div>

        <div class="panel">
          <p class="panel-label">Weekly hours</p>
          <div class="week-list" id="week-list"></div>
        </div>
      </div>

      <div class="bottom">
        <div class="bottom-left">
          <div id="updated-at">Updated: —</div>
          <div class="source" id="source">Source: —</div>
        </div>
        <div id="local-time">Toronto time: —</div>
      </div>
    </div>
  </div>

  <script>
    const dayOrder = [
      "monday",
      "tuesday",
      "wednesday",
      "thursday",
      "friday",
      "saturday",
      "sunday"
    ];

    function to24HourMinutes(hour, minute, period) {
      let h = hour;
      if (period === "AM" && h === 12) h = 0;
      if (period === "PM" && h !== 12) h += 12;
      return h * 60 + minute;
    }

    function parseTimeToMinutes(timeText) {
      const match = timeText.trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (!match) return null;

      const hour = parseInt(match[1], 10);
      const minute = parseInt(match[2], 10);
      const period = match[3].toUpperCase();

      return to24HourMinutes(hour, minute, period);
    }

    function isOpenNowFromHours(hoursText, currentMinutes) {
      if (!hoursText) return false;
      if (hoursText.trim().toLowerCase() === "closed") return false;

      const ranges = hoursText.split(",").map(part => part.trim()).filter(Boolean);

      for (const range of ranges) {
        const parts = range.split("–").map(part => part.trim());
        if (parts.length !== 2) continue;

        const start = parseTimeToMinutes(parts[0]);
        const end = parseTimeToMinutes(parts[1]);

        if (start === null || end === null) continue;

        if (currentMinutes >= start && currentMinutes < end) {
          return true;
        }
      }

      return false;
    }

    function getTorontoNowParts() {
      const now = new Date();

      const weekday = new Intl.DateTimeFormat("en-US", {
        weekday: "long",
        timeZone: "America/Toronto"
      }).format(now);

      const timeParts = new Intl.DateTimeFormat("en-US", {
        hour: "numeric",
        minute: "2-digit",
        hour12: true,
        timeZone: "America/Toronto"
      }).formatToParts(now);

      const hour = parseInt(timeParts.find(p => p.type === "hour").value, 10);
      const minute = parseInt(timeParts.find(p => p.type === "minute").value, 10);
      const dayPeriod = timeParts.find(p => p.type === "dayPeriod").value.toUpperCase();

      const prettyTime = new Intl.DateTimeFormat("en-US", {
        weekday: "long",
        hour: "numeric",
        minute: "2-digit",
        hour12: true,
        timeZone: "America/Toronto"
      }).format(now);

      return {
        weekdayLabel: weekday,
        weekdayKey: weekday.toLowerCase(),
        currentMinutes: to24HourMinutes(hour, minute, dayPeriod),
        prettyTime
      };
    }

    function setStatus(isOpen) {
      const statusEl = document.getElementById("status");
      statusEl.textContent = isOpen ? "OPEN NOW" : "CLOSED";
      statusEl.className = isOpen ? "status open" : "status closed";
    }

    function renderWeek(data) {
      const weekList = document.getElementById("week-list");
      weekList.innerHTML = "";

      for (const day of dayOrder) {
        const dayEl = document.createElement("div");
        dayEl.className = "week-day";
        dayEl.textContent = day;

        const hoursEl = document.createElement("div");
        hoursEl.className = "week-hours";
        hoursEl.textContent = data[day] || "Closed";

        weekList.appendChild(dayEl);
        weekList.appendChild(hoursEl);
      }
    }

    async function loadClinicHours() {
      try {
        const response = await fetch("clinic-hours-sensecraft.json?v=" + Date.now());
        const data = await response.json();

        const torontoNow = getTorontoNowParts();
        const todayHours = data[torontoNow.weekdayKey] || "Closed";
        const isOpen = isOpenNowFromHours(todayHours, torontoNow.currentMinutes);

        document.getElementById("clinic-name").textContent = data.clinic_name || "Clinic";
        document.getElementById("clinic-address").textContent = data.address || "";
        document.getElementById("today-name").textContent = torontoNow.weekdayLabel;
        document.getElementById("today-hours").textContent = todayHours;
        document.getElementById("updated-at").textContent = "Updated: " + (data.updated_at || "—");
        document.getElementById("source").textContent = "Source: " + (data.source || "—");
        document.getElementById("local-time").textContent = "Toronto time: " + torontoNow.prettyTime;

        setStatus(isOpen);
        renderWeek(data);

        document.getElementById("card").classList.remove("loading");
      } catch (error) {
        document.getElementById("clinic-name").textContent = "Unable to load clinic hours";
        document.getElementById("clinic-address").textContent = "Please check clinic-hours-sensecraft.json";
        document.getElementById("today-name").textContent = "Error";
        document.getElementById("today-hours").textContent = "Hours unavailable";
        document.getElementById("updated-at").textContent = "Updated: —";
        document.getElementById("source").textContent = "Source: —";
        document.getElementById("local-time").textContent = "Toronto time: unavailable";
        setStatus(false);
        document.getElementById("card").classList.remove("loading");
      }
    }

    loadClinicHours();
  </script>
</body>
</html>
