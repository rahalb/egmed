<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Clinic Hours</title>
  <style>
    :root{
      --paper:#e9e5db;
      --ink:#111111;
      --line:#c9c3b7;
      --frame:#0d0d0f;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#f2efe7;font-family:Arial,Helvetica,sans-serif;color:var(--ink)}
    .page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .frame{width:min(100%,800px);aspect-ratio:800/480;background:var(--frame);border-radius:38px;padding:34px}
    .screen{width:100%;height:100%;background:var(--paper);border-radius:30px;padding:22px 28px 18px 28px;overflow:hidden}
    .title{font-size:22px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin:0 0 10px 0}
    .rule{height:2px;background:var(--line);margin:0 0 14px 0}
    .hero{display:grid;grid-template-columns:170px 1fr;gap:20px;align-items:center;padding-bottom:10px}
    .status-pill{display:inline-flex;align-items:center;justify-content:center;min-height:58px;padding:0 24px;border-radius:999px;background:#111;color:#f5f2ea;font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:.02em}
    .status-pill.closed{background:#5b5751}
    .today-label{font-size:18px;letter-spacing:.05em;text-transform:uppercase;color:#55514c;margin:0}
    .today-day{font-size:28px;font-weight:800;margin:2px 0 6px 0}
    .today-hours{font-size:29px;font-weight:800;line-height:1.08;margin:0}
    .section-rule{height:2px;background:var(--line);margin:8px 0 10px 0}
    .section-title{font-size:21px;letter-spacing:.05em;text-transform:uppercase;color:#4d4943;margin:0 0 10px 0}
    .week{display:grid;grid-template-columns:1fr 1fr;gap:0 28px}
    .col{display:grid;grid-template-rows:repeat(3,auto);gap:0}
    .row{display:grid;grid-template-columns:84px 1fr;gap:16px;align-items:start;padding:9px 0 8px 0;border-bottom:2px solid var(--line)}
    .dow{font-size:18px;font-weight:800;text-transform:uppercase}
    .hours{font-size:20px;line-height:1.05;font-weight:700}
    .hours.closed{font-style:italic;color:#4e4a45;font-weight:700}
    .footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px;color:#66625b}
    @media (max-width:700px){
      .frame{padding:18px;border-radius:24px}
      .screen{padding:16px 18px}
      .hero{grid-template-columns:1fr;gap:10px}
      .week{grid-template-columns:1fr}
      .title{font-size:18px}
      .today-hours{font-size:23px}
      .row{grid-template-columns:64px 1fr}
      .hours{font-size:18px}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="frame">
      <div class="screen">
        <h1 class="title" id="clinic_name">Clinic Hours</h1>
        <div class="rule"></div>

        <div class="hero">
          <div>
            <div class="status-pill" id="status_pill">OPEN NOW</div>
          </div>
          <div>
            <p class="today-label">Today</p>
            <div class="today-day" id="today_name">Tuesday</div>
            <p class="today-hours" id="today_hours">10:00 AM – 3:00 PM</p>
          </div>
        </div>

        <div class="section-rule"></div>
        <h2 class="section-title">Weekly Hours</h2>

        <div class="week">
          <div class="col">
            <div class="row"><div class="dow">MON</div><div class="hours" id="monday">-</div></div>
            <div class="row"><div class="dow">TUE</div><div class="hours" id="tuesday">-</div></div>
            <div class="row"><div class="dow">WED</div><div class="hours" id="wednesday">-</div></div>
          </div>
          <div class="col">
            <div class="row"><div class="dow">FRI</div><div class="hours" id="friday">-</div></div>
            <div class="row"><div class="dow">SAT</div><div class="hours" id="saturday">-</div></div>
            <div class="row"><div class="dow">SUN</div><div class="hours" id="sunday">-</div></div>
          </div>
        </div>

        <div class="footer">
          <span id="address">&nbsp;</span>
          <span id="updated_at">&nbsp;</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const JSON_URL = './clinic-hours-sensecraft.json';

    function applyClosedStyle(el, value){
      if(!el) return;
      const isClosed = String(value || '').trim().toLowerCase() === 'closed';
      el.classList.toggle('closed', isClosed);
    }

    function setText(id, value){
      const el = document.getElementById(id);
      if(!el) return;
      el.textContent = value || '-';
      if(['monday','tuesday','wednesday','friday','saturday','sunday'].includes(id)) {
        applyClosedStyle(el, value);
      }
    }

    async function loadData(){
      const res = await fetch(JSON_URL, {cache:'no-store'});
      if(!res.ok) throw new Error('Could not load ' + JSON_URL);
      const data = await res.json();

      setText('clinic_name', data.clinic_name || 'Clinic Hours');
      setText('today_name', data.today_name || 'Today');
      setText('today_hours', data.today_hours || '-');
      setText('monday', data.monday);
      setText('tuesday', data.tuesday);
      setText('wednesday', data.wednesday);
      setText('friday', data.friday);
      setText('saturday', data.saturday);
      setText('sunday', data.sunday);
      document.getElementById('address').textContent = data.address || '';
      document.getElementById('updated_at').textContent = data.updated_at ? 'Updated ' + new Date(data.updated_at).toLocaleString() : '';

      const status = String(data.status || '').toLowerCase();
      const pill = document.getElementById('status_pill');
      if(status === 'open') {
        pill.textContent = 'OPEN NOW';
        pill.classList.remove('closed');
      } else {
        pill.textContent = 'CLOSED';
        pill.classList.add('closed');
      }
    }

    loadData().catch(err => {
      console.error(err);
      document.getElementById('updated_at').textContent = 'JSON failed to load';
    });
  </script>
</body>
</html>
