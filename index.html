<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinic Hours</title>
  <style>
    :root {
      --bg: #d9d6cf;
      --frame: #0a0a0a;
      --panel: #e9e5dc;
      --rule: #bdb7ad;
      --text: #171717;
      --muted: #585550;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 800px;
      height: 480px;
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
    }
    .screen {
      width: 800px;
      height: 480px;
      position: relative;
      background: var(--bg);
      overflow: hidden;
    }
    .frame {
      position: absolute;
      left: 20px;
      top: 18px;
      width: 760px;
      height: 444px;
      background: var(--frame);
      border-radius: 34px;
    }
    .panel {
      position: absolute;
      left: 54px;
      top: 52px;
      width: 692px;
      height: 374px;
      background: var(--panel);
      border-radius: 28px;
      padding: 22px 28px 18px 28px;
      overflow: hidden;
    }
    .title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
    }
    .rule {
      height: 2px;
      background: var(--rule);
      width: 100%;
    }
    .hero {
      display: grid;
      grid-template-columns: 150px 1fr;
      column-gap: 18px;
      align-items: center;
      padding: 12px 0 10px 0;
    }
    .pill {
      width: 146px;
      height: 50px;
      border-radius: 25px;
      background: var(--frame);
      color: #f4f1ea;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .today-label {
      font-size: 16px;
      color: var(--muted);
      letter-spacing: .5px;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 2px;
    }
    .today-name {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.02;
      margin-bottom: 6px;
    }
    .today-hours {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.08;
      max-width: 360px;
    }
    .section-title {
      font-size: 17px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 12px 0 6px 0;
    }
    .hours-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 34px;
      margin-top: 2px;
    }
    .row {
      display: grid;
      grid-template-columns: 72px 1fr;
      column-gap: 12px;
      align-items: start;
      padding: 7px 0 6px 0;
      border-bottom: 2px solid var(--rule);
      min-height: 32px;
    }
    .day {
      font-size: 17px;
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1;
    }
    .value {
      font-size: 17px;
      line-height: 1.03;
      font-weight: 500;
    }
    .closed {
      font-style: italic;
      font-weight: 700;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="frame"></div>
    <div class="panel">
      <div class="title" id="clinic_name">EAST GWILLIMBURY MEDICAL CENTRE</div>
      <div class="rule"></div>

      <div class="hero">
        <div class="pill" id="status">OPEN NOW</div>
        <div>
          <div class="today-label">Today</div>
          <div class="today-name" id="today_name">Tuesday</div>
          <div class="today-hours" id="today_hours">10:00 AM – 3:00 PM, 4:30 – 7:00 PM</div>
        </div>
      </div>

      <div class="rule"></div>
      <div class="section-title">Weekly Hours</div>

      <div class="hours-grid">
        <div>
          <div class="row"><div class="day">MON</div><div class="value" id="monday"></div></div>
          <div class="row"><div class="day">TUE</div><div class="value" id="tuesday"></div></div>
          <div class="row"><div class="day">WED</div><div class="value" id="wednesday"></div></div>
        </div>
        <div>
          <div class="row"><div class="day">THU</div><div class="value" id="thursday"></div></div>
          <div class="row"><div class="day">FRI</div><div class="value" id="friday"></div></div>
          <div class="row"><div class="day">SAT</div><div class="value" id="saturday"></div></div>
          <div class="row"><div class="day">SUN</div><div class="value" id="sunday"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const DATA_URL = './clinic-hours-sensecraft.json';

    function statusText(v) {
      if (!v) return '';
      const s = String(v).trim().toLowerCase();
      if (s === 'open') return 'OPEN NOW';
      if (s === 'closed') return 'CLOSED';
      return String(v).toUpperCase();
    }

    function setField(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = value || '';
      if (String(value).trim().toLowerCase() === 'closed') {
        el.classList.add('closed');
      }
    }

    fetch(DATA_URL)
      .then(r => r.json())
      .then(data => {
        document.getElementById('clinic_name').textContent = (data.clinic_name || '').toUpperCase();
        document.getElementById('status').textContent = statusText(data.status);
        document.getElementById('today_name').textContent = data.today_name || '';
        document.getElementById('today_hours').textContent = data.today_hours || '';
        ['monday','tuesday','wednesday','thursday','friday','saturday','sunday']
          .forEach(k => setField(k, data[k] || ''));
      });
  </script>
</body>
</html>
